      enabled: false
      className: nginx
      host: ""
      path: /
      pathType: Prefix
      annotations: {}
      tls:
        enabled: false
        secretName: ""
    networkPolicy:
      enabled: false
      allowSameNamespace: true
      allowedNamespaces: []
