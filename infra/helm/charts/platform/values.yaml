global:
  environment: dev
  imagePullPolicy: IfNotPresent
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: true
  name: ""
commonLabels: {}
commonAnnotations: {}
ingestionApi:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/event-tracking/ingestion-api
    tag: latest
  containerPort: 8080
  service:
    enabled: true
    type: ClusterIP
    port: 8080
  resources: {}
  env: []
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 75
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  ingress:
    enabled: false
    className: nginx
    host: ""
    path: /
    pathType: Prefix
    annotations: {}
    tls:
      enabled: false
      secretName: ""
  networkPolicy:
    enabled: false
    allowSameNamespace: true
    allowedNamespaces: []
