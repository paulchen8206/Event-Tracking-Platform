      enabled: false
      minReplicas: 1
      maxReplicas: 2
      targetCPUUtilizationPercentage: 75
    podDisruptionBudget:
      enabled: false
      minAvailable: 1
    networkPolicy:
      enabled: false
      allowSameNamespace: true
      allowedNamespaces: []
  worker:
    replicaCount: 1
    command:
    - bash
    - -c
    - airflow celery worker
    containerPort: 8793
    resources: {}
    env: []
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 6
      targetCPUUtilizationPercentage: 75
    podDisruptionBudget:
      enabled: false
