airflow:
  enabled: true
  image:
    repository: apache/airflow
    tag: 2.9.2
  webserver:
    replicaCount: 1
    command:
    - bash
    - -c
    - airflow webserver
    containerPort: 8080
    service:
      enabled: true
      type: ClusterIP
      port: 8080
    resources: {}
    env: []
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 75
    podDisruptionBudget:
      enabled: false
      minAvailable: 1
