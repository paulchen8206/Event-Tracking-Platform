global:
  environment: qa
  imagePullPolicy: IfNotPresent
# QA mirrors production component topology but keeps minimal pod sizing.
ingestionApi:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi
servingApi:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi
kafkaConnect:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
airflow:
  enabled: true
  scheduler:
    replicaCount: 1
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  webserver:
    replicaCount: 1
    resources:
      requests:
        cpu: 150m
        memory: 256Mi
      limits:
        cpu: 400m
        memory: 512Mi
  worker:
    replicaCount: 1
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 800m
        memory: 1Gi
observability:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi